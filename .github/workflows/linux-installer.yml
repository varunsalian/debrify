name: Setup and Clone Debrify

on:
  workflow_dispatch:

jobs:
  setup-and-clone:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install Python 3.12.7
      run: |
        sudo apt update
        sudo apt install -y software-properties-common
        sudo add-apt-repository -y ppa:deadsnakes/ppa
        sudo apt update
        sudo apt install -y python3.12 python3.12-venv python3.12-dev
        curl -sS https://bootstrap.pypa.io/get-pip.py | python3.12
        python3.12 --version
        pip --version

    - name: Install Git
      run: |
        sudo apt update
        sudo apt install -y git
        git --version

    - name: Create and Activate Virtual Environment
      run: |
        python3.12 -m venv venv
        source venv/bin/activate
        pip install --upgrade pip setuptools wheel
        echo "Virtual environment setup completed."

    - name: Install PyInstaller in Virtual Environment
      run: |
        source venv/bin/activate
        pip install pyinstaller
        pyinstaller --version

    - name: Build executable with PyInstaller
      run: |
        source venv/bin/activate
        pyinstaller \
          --noconfirm \
          --onedir \
          --console \
          --add-data "debrify/config/config.yaml:debrify/config/" \
          --add-data "debrify/config/error_codes.json:rdapi/" \
          --add-data "debrify/data:debrify/data/" \
          "debrify/main.py"

    - name: Execute Main with --force-update
      run: |
        chmod +x dist/main/main
        ./dist/main/main --force-update

    - name: Execute Main with --keywords kannada
      run: |
        ./dist/main/main --keywords kannada
          
